<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html,body{
    margin:0;
    padding:0;
    background:transparent;
    overflow-x:hidden;
    font-family:Arial,sans-serif;
}

.banner{

    position:fixed;
    top:0;
    left:0;
    width:100%;

    z-index:999999;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:18px;

    padding:14px 20px;

    background:rgba(248,105,137,.55);

    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);

    border-bottom:1px solid rgba(255,255,255,.35);

    box-shadow:0 4px 16px rgba(0,0,0,.12);

}

.timer{

    color:#fff;

    font-size:52px;

    font-weight:700;

    letter-spacing:1px;

    text-shadow:0 2px 6px rgba(0,0,0,.18);

}

.texto{

    color:#fff;

    font-size:32px;

    font-weight:400;

    white-space:nowrap;

    text-shadow:0 2px 6px rgba(0,0,0,.18);

}

@media(max-width:768px){

.banner{

padding:10px;

gap:10px;

}

.timer{

font-size:30px;

}

.texto{

font-size:20px;

}

}

</style>

</head>

<body>

<div class="banner">

<div id="timer" class="timer">
05:00
</div>

<div class="texto">
⏰ ¡Oferta especial solo por hoy!
</div>

</div>

<script>

let tempo = 300;

function atualizar(){

let minutos = Math.floor(tempo/60);
let segundos = tempo%60;

document.getElementById("timer").innerHTML =
String(minutos).padStart(2,"0")+":"+
String(segundos).padStart(2,"0");

if(tempo<=0){

tempo=300;

}else{

tempo--;

}

}

atualizar();

setInterval(atualizar,1000);

</script>

</body>
</html>
