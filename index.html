
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
background:transparent;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
}

.barra{

position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);

display:flex;
align-items:center;
justify-content:center;

z-index:999999;

background:rgba(255,255,255,.20);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);

border:1px solid rgba(255,255,255,.28);

padding:12px 22px;

border-radius:18px;

box-shadow:
0 8px 25px rgba(0,0,0,.18);

}

#timer{

font-size:44px;
font-weight:800;
color:#fff;

text-shadow:
0 2px 6px rgba(0,0,0,.45);

letter-spacing:1px;

margin-right:18px;

}

.texto{

font-size:28px;
font-weight:700;

color:#fff;

text-shadow:
0 2px 6px rgba(0,0,0,.45);

white-space:nowrap;

}

@media(max-width:768px){

.barra{

top:8px;

width:96%;

padding:10px 14px;

border-radius:14px;

}

#timer{

font-size:30px;

margin-right:10px;

}

.texto{

font-size:18px;

}

}

</style>

</head>

<body>

<div class="barra">

<div id="timer">
05:00
</div>

<div class="texto">
🔥 Oferta especial solo por hoy
</div>

</div>

<script>

let tempo=300;

function atualizar(){

let minutos=Math.floor(tempo/60);

let segundos=tempo%60;

document.getElementById("timer").innerHTML=

String(minutos).padStart(2,"0")

+":"

+

String(segundos).padStart(2,"0");

if(tempo>0){

tempo--;

}else{

tempo=300;

}

}

atualizar();

setInterval(atualizar,1000);

</script>

</body>

</html>
