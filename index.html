<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html,body{
margin:0;
padding:0;
background:transparent;
overflow:hidden;
font-family:Arial,sans-serif;
}

.banner{

position:fixed;
top:0;
left:0;

width:100%;
height:58px;

display:flex;
justify-content:center;
align-items:center;
gap:12px;

padding:0 12px;
box-sizing:border-box;

background:rgba(255,76,76,.72);

backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);

color:white;

box-shadow:0 4px 18px rgba(0,0,0,.18);

z-index:999999;

overflow:hidden;

}

#timer{

font-size:44px;
font-weight:700;
line-height:1;
white-space:nowrap;
flex-shrink:0;

text-shadow:0 2px 8px rgba(0,0,0,.25);

}

#texto{

font-size:20px;
font-weight:400;
white-space:nowrap;

overflow:hidden;
text-overflow:ellipsis;

text-shadow:0 2px 8px rgba(0,0,0,.25);

}

@media(max-width:768px){

.banner{

height:52px;
gap:8px;
padding:0 10px;

}

#timer{

font-size:28px;

}

#texto{

font-size:16px;

}

}

</style>

</head>

<body>

<div class="banner">

<div id="timer">05:00</div>

<div id="texto">🔥 ¡Oferta especial solo por hoy!</div>

</div>

<script>

let tiempo=300;

function actualizar(){

let minutos=Math.floor(tiempo/60);
let segundos=tiempo%60;

document.getElementById("timer").innerHTML=
String(minutos).padStart(2,"0")+":"+
String(segundos).padStart(2,"0");

if(tiempo>0){

tiempo--;

}else{

tiempo=300;

}

}

actualizar();

setInterval(actualizar,1000);

</script>

</body>

</html>
