<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
    margin:0;
    padding:0;
    background:transparent;
    font-family:Arial,sans-serif;
}

.banner{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:999999;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:18px;

    padding:14px 18px;

    background:rgba(245,107,146,.88);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    box-shadow:0 6px 20px rgba(0,0,0,.18);
}

.timer{
    font-size:42px;
    font-weight:800;
    color:#fff;
    min-width:150px;
    text-align:center;
    text-shadow:0 2px 6px rgba(0,0,0,.25);
}

.texto{
    display:flex;
    align-items:center;
    gap:10px;

    color:#fff;
    font-size:34px;
    font-weight:700;
    white-space:nowrap;

    text-shadow:0 2px 6px rgba(0,0,0,.25);
}

@media(max-width:768px){

.banner{
    gap:10px;
    padding:12px 10px;
}

.timer{
    font-size:26px;
    min-width:auto;
}

.texto{
    font-size:20px;
}

}
</style>

</head>

<body>

<div class="banner">

<div class="timer" id="timer">
05:00
</div>

<div class="texto">
⏰ ¡Oferta especial solo por hoy!
</div>

</div>

<script>

let tempo = 300;

function atualizar(){

let minutos = Math.floor(tempo/60);
let segundos = tempo%60;

document.getElementById("timer").innerHTML =
String(minutos).padStart(2,"0")+":"+
String(segundos).padStart(2,"0");

if(tempo<=0){
    tempo=300;
}else{
    tempo--;
}

}

atualizar();
setInterval(atualizar,1000);

</script>

</body>
</html>
