<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
background:transparent;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}

/* BARRA */

.banner{

position:fixed;
top:0;
left:0;

width:100%;
height:62px;

display:flex;
justify-content:center;
align-items:center;
gap:16px;

padding:0 18px;

background:rgba(255,75,75,.58);

backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);

box-shadow:
0 3px 18px rgba(0,0,0,.18);

z-index:999999;

}

/* RELÓGIO */

#timer{

font-size:48px;
font-weight:800;
color:white;

letter-spacing:1px;

text-shadow:
0 2px 10px rgba(0,0,0,.25);

flex-shrink:0;

}

/* TEXTO */

#texto{

font-size:21px;
font-weight:400;
color:white;

white-space:nowrap;

overflow:hidden;
text-overflow:ellipsis;

text-shadow:
0 2px 8px rgba(0,0,0,.20);

}

/* MOBILE */

@media(max-width:768px){

.banner{

height:56px;
gap:10px;
padding:0 12px;

}

#timer{

font-size:34px;

}

#texto{

font-size:17px;

}

}

</style>

</head>

<body>

<div class="banner">

<div id="timer">05:00</div>

<div id="texto">🔥 ¡Oferta especial solo por hoy!</div>

</div>

<script>

const DURACAO = 5 * 60;
let tempo = DURACAO;

function atualizar(){

const minutos = Math.floor(tempo/60);
const segundos = tempo%60;

document.getElementById("timer").textContent =
String(minutos).padStart(2,"0")+":"+
String(segundos).padStart(2,"0");

if(tempo>0){
tempo--;
}else{
tempo=DURACAO;
}

}

atualizar();

setInterval(atualizar,1000);

</script>

</body>
</html>
