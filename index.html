<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html,body{
margin:0;
padding:0;
background:transparent;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
}

/* Barra fixa */

.banner{

position:fixed;
top:0;
left:0;

width:100%;
height:60px;

display:flex;
justify-content:center;
align-items:center;
gap:14px;

padding:0 14px;
box-sizing:border-box;

background:rgba(255,82,82,.68);

backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);

box-shadow:0 4px 18px rgba(0,0,0,.18);

color:#fff;

z-index:999999;

}

/* Relógio */

#timer{

font-size:44px;
font-weight:700;

white-space:nowrap;

text-shadow:0 2px 6px rgba(0,0,0,.25);

flex-shrink:0;

}

/* Texto */

#texto{

font-size:22px;
font-weight:400;

white-space:nowrap;

overflow:hidden;
text-overflow:ellipsis;

text-shadow:0 2px 6px rgba(0,0,0,.25);

}

/* Celular */

@media(max-width:768px){

.banner{

height:55px;
gap:8px;
padding:0 10px;

}

#timer{

font-size:32px;

}

#texto{

font-size:17px;

}

}

</style>

</head>

<body>

<div class="banner">

<div id="timer">05:00</div>

<div id="texto">🔥 ¡Oferta especial solo por hoy!</div>

</div>

<script>

let tempo = 300;

function atualizar(){

const minutos = Math.floor(tempo/60);
const segundos = tempo%60;

document.getElementById("timer").innerHTML =
String(minutos).padStart(2,"0")+":"+
String(segundos).padStart(2,"0");

if(tempo>0){

tempo--;

}else{

tempo=300;

}

}

atualizar();

setInterval(atualizar,1000);

</script>

</body>
</html>
