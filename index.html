<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
    margin:0;
    padding:0;
    background:transparent;
    font-family:Arial,sans-serif;
}

.banner{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:rgba(255, 93, 114, 0.82);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);

    display:flex;
    justify-content:center;
    align-items:center;
    gap:16px;

    color:#fff;
    z-index:999999;

    box-shadow:0 3px 12px rgba(0,0,0,.18);
}

#timer{
    font-size:36px;
    font-weight:700;
    text-shadow:0 2px 8px rgba(0,0,0,.25);
    white-space:nowrap;
}

#texto{
    font-size:22px;
    font-weight:400;
    white-space:nowrap;
    text-shadow:0 2px 8px rgba(0,0,0,.18);
}

@media(max-width:768px){

.banner{
    height:54px;
    gap:10px;
}

#timer{
    font-size:28px;
}

#texto{
    font-size:18px;
}

}
</style>

</head>

<body>

<div class="banner">

    <div id="timer">05:00</div>

    <div id="texto">⏱️ ¡Oferta especial solo por hoy!</div>

</div>

<script>

let tiempo=300;

function actualizar(){

let minutos=Math.floor(tiempo/60);
let segundos=tiempo%60;

document.getElementById("timer").innerHTML=
String(minutos).padStart(2,'0')+":"+
String(segundos).padStart(2,'0');

if(tiempo>0){
tiempo--;
}

}

actualizar();

setInterval(actualizar,1000);

</script>

</body>
</html>
