<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    background:transparent;
    overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}

.banner{

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:58px;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;

    padding:0 16px;

    background:rgba(255,76,76,.65);

    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    color:#fff;

    box-shadow:0 3px 12px rgba(0,0,0,.18);

    z-index:999999;

}

#timer{

    font-size:42px;
    font-weight:700;
    line-height:1;
    white-space:nowrap;

    text-shadow:0 2px 8px rgba(0,0,0,.25);

}

#texto{

    font-size:22px;
    font-weight:400;

    white-space:nowrap;

    overflow:hidden;
    text-overflow:ellipsis;

    text-shadow:0 2px 8px rgba(0,0,0,.20);

}

@media(max-width:768px){

.banner{

    height:54px;
    gap:8px;
    padding:0 10px;

}

#timer{

    font-size:30px;

}

#texto{

    font-size:17px;

}

}

</style>

</head>

<body>

<div class="banner">

<div id="timer">05:00</div>

<div id="texto">¡Oferta especial solo por hoy!</div>

</div>

<script>

const DURACION = 300;

let tiempo = DURACION;

function actualizar(){

const minutos = Math.floor(tiempo/60);
const segundos = tiempo%60;

document.getElementById("timer").textContent =
String(minutos).padStart(2,"0")+":"+
String(segundos).padStart(2,"0");

if(tiempo>0){

tiempo--;

}else{

tiempo=DURACION;

}

}

actualizar();

setInterval(actualizar,1000);

</script>

</body>
</html>
